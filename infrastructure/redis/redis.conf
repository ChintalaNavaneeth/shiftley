# redis.conf — Shiftley Local Development
# Tuned for dev: no persistence, memory capped at 256mb

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence — DISABLED for dev (data is ephemeral, that's fine)
save ""
appendonly no

# Performance
tcp-keepalive 300
timeout 0

# Logging
loglevel notice
