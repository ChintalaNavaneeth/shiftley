basePath: /api/v1
definitions:
  admin.ConfigUpdateRequest:
    properties:
      employer_per_day_fee:
        type: number
      employer_subscription_monthly:
        type: number
      employer_subscription_weekly:
        type: number
      worker_cancel_penalty:
        type: number
    type: object
  admin.CreateCategoryRequest:
    properties:
      id:
        type: string
      name:
        type: string
    required:
    - id
    - name
    type: object
  admin.CreateSkillRequest:
    properties:
      id:
        type: string
      name:
        type: string
    required:
    - id
    - name
    type: object
  admin.InviteUserRequest:
    properties:
      aadhaar_number:
        type: string
      email:
        type: string
      full_name:
        type: string
      phone_number:
        type: string
      role:
        type: string
    required:
    - aadhaar_number
    - email
    - full_name
    - phone_number
    - role
    type: object
  admin.ManagementUserRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      phone_number:
        type: string
      role:
        type: string
    required:
    - email
    - full_name
    - phone_number
    - role
    type: object
  admin.ToggleStateRequest:
    properties:
      is_active:
        type: boolean
    type: object
  admin.UserStatusRequest:
    properties:
      reason:
        type: string
      status:
        description: SUSPENDED, ACTIVE
        type: string
    required:
    - status
    type: object
  utils.ErrorDetail:
    properties:
      code:
        type: string
      details:
        items:
          type: string
        type: array
      message:
        type: string
    type: object
  utils.FailureResponse:
    properties:
      error:
        $ref: '#/definitions/utils.ErrorDetail'
      success:
        type: boolean
    type: object
  utils.SuccessResponse:
    properties:
      data: {}
      meta: {}
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: support@shiftley.com
    name: API Support
    url: http://www.shiftley.com/support
  description: Shiftley Backend API Documentation.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Shiftley API
  version: "1.0"
paths:
  /admin/config/fees:
    patch:
      consumes:
      - application/json
      description: Updates global business variables like platform cuts or fees.
      parameters:
      - description: Config Updates
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.ConfigUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
      security:
      - ApiKeyAuth: []
      summary: Update Platform Configuration
      tags:
      - Admin
  /admin/super/users:
    post:
      consumes:
      - application/json
      description: Creates ADMIN and HR_ADMIN accounts. Restricted to SUPER_ADMIN.
      parameters:
      - description: Management User Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.ManagementUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.FailureResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.FailureResponse'
      security:
      - ApiKeyAuth: []
      summary: Create Management Roles
      tags:
      - Admin
  /admin/taxonomy/categories:
    post:
      consumes:
      - application/json
      description: Adds a new broad job category to the platform.
      parameters:
      - description: Category Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
      security:
      - ApiKeyAuth: []
      summary: Create Taxonomy Category
      tags:
      - Admin
  /admin/taxonomy/categories/{categoryId}/skills:
    post:
      consumes:
      - application/json
      description: Adds a specific job role under an existing category.
      parameters:
      - description: Category ID
        in: path
        name: categoryId
        required: true
        type: string
      - description: Skill Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.CreateSkillRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
      security:
      - ApiKeyAuth: []
      summary: Create Taxonomy Skill
      tags:
      - Admin
  /admin/taxonomy/skills/{id}:
    patch:
      consumes:
      - application/json
      description: Safely disables a skill so it no longer appears in public dropdowns.
      parameters:
      - description: Skill ID
        in: path
        name: id
        required: true
        type: string
      - description: Toggle State
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.ToggleStateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
      security:
      - ApiKeyAuth: []
      summary: Toggle Taxonomy State
      tags:
      - Admin
  /admin/users/{id}/status:
    patch:
      consumes:
      - application/json
      description: Instantly revokes access for staff or public users.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Status Update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.UserStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
      security:
      - ApiKeyAuth: []
      summary: Revoke / Ban User
      tags:
      - Admin
  /admin/users/invite:
    post:
      consumes:
      - application/json
      description: Creates an internal account and triggers an email with a secure,
        temporary password.
      parameters:
      - description: Invitation Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.InviteUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.FailureResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.FailureResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/utils.FailureResponse'
      security:
      - ApiKeyAuth: []
      summary: Invite Internal Staff
      tags:
      - Admin
  /auth/otp/send:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Sends a 6-digit OTP to the user's phone or email
      parameters:
      - description: Identifier (Phone or Email)
        in: formData
        name: identifier
        required: true
        type: string
      - description: Type
        enum:
        - PHONE
        - EMAIL
        in: formData
        name: type
        required: true
        type: string
      - description: Role
        enum:
        - WORKER
        - EMPLOYER
        in: formData
        name: role
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.FailureResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.FailureResponse'
      summary: Request OTP
      tags:
      - Auth
  /auth/otp/verify:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Verifies the OTP and returns a JWT token
      parameters:
      - description: Identifier (Phone or Email)
        in: formData
        name: identifier
        required: true
        type: string
      - description: Type
        enum:
        - PHONE
        - EMAIL
        in: formData
        name: type
        required: true
        type: string
      - description: 6-digit OTP
        in: formData
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.FailureResponse'
      summary: Verify OTP
      tags:
      - Auth
  /onboarding/employee:
    post:
      consumes:
      - multipart/form-data
      description: Completes the onboarding process for an employee
      parameters:
      - description: Full Name
        in: formData
        name: full_name
        required: true
        type: string
      - description: Email
        in: formData
        name: email
        required: true
        type: string
      - description: Phone Number
        in: formData
        name: phone_number
        required: true
        type: string
      - description: 'Skill IDs (JSON array: [\'
        in: formData
        name: skill_ids
        required: true
        type: string
      - description: Degree (Optional)
        in: formData
        name: degree
        type: string
      - description: Specialization (Optional)
        in: formData
        name: specialization
        type: string
      - description: Passing Year (Optional)
        in: formData
        name: passing_year
        type: integer
      - description: Aadhaar PDF (Masked)
        in: formData
        name: aadhaar_pdf
        required: true
        type: file
      - description: Profile Picture (Professional)
        in: formData
        name: profile_picture
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.FailureResponse'
      security:
      - ApiKeyAuth: []
      summary: Onboard Employee
      tags:
      - Onboarding
  /onboarding/employer:
    post:
      consumes:
      - multipart/form-data
      description: Completes the onboarding process for an employer
      parameters:
      - description: Full Name
        in: formData
        name: full_name
        required: true
        type: string
      - description: Business Name
        in: formData
        name: business_name
        required: true
        type: string
      - description: Business Type
        in: formData
        name: business_type
        required: true
        type: string
      - description: 'Location (JSON string: {\'
        in: formData
        name: location
        required: true
        type: string
      - description: Business Address
        in: formData
        name: business_address
        required: true
        type: string
      - description: GST Number (Optional)
        in: formData
        name: gst_number
        type: string
      - description: Email
        in: formData
        name: email
        required: true
        type: string
      - description: Business Phone Number
        in: formData
        name: business_phone_number
        required: true
        type: string
      - description: Employer Phone Number
        in: formData
        name: employer_phone_number
        required: true
        type: string
      - description: Aadhaar Number (12 digits)
        in: formData
        name: aadhaar_number
        required: true
        type: string
      - description: Aadhaar PDF (Masked)
        in: formData
        name: aadhaar_pdf
        required: true
        type: file
      - description: Business Photo 1
        in: formData
        name: business_photo_1
        required: true
        type: file
      - description: Business Photo 2
        in: formData
        name: business_photo_2
        required: true
        type: file
      - description: Business Photo 3
        in: formData
        name: business_photo_3
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.FailureResponse'
      security:
      - ApiKeyAuth: []
      summary: Onboard Employer
      tags:
      - Onboarding
  /taxonomy:
    get:
      description: Returns a fully nested list of all active categories and their
        child skills.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
      summary: Get All Categories & Skills
      tags:
      - Taxonomy
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
