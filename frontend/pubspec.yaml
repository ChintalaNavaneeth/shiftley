name: shiftley_frontend
description: "Shiftley - Premium Gig Matching Platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3
  retrofit: ^4.1.0

  # UI
  flutter_svg: ^2.0.10+1
  pinput: ^4.0.0
  flutter_spinkit: ^5.2.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  logger: ^2.3.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.2
  file_picker: ^11.0.2
  flutter_secure_storage: ^10.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/s-orange.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Figtree
      fonts:
        - asset: assets/fonts/Figtree-VariableFont_wght.ttf
    - family: Licorice
      fonts:
        - asset: assets/fonts/Licorice-Regular.ttf
